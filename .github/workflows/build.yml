name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *" # build at 06:00 UTC every day
        # (20 minutes after last ublue images start building)
  push:
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"

  pull_request:
  workflow_dispatch: # allow manually triggering builds
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        recipe:
          # !! Add your recipes here
          - recipe.yml
    steps:
      # the build is fully handled by the reusable github action
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

          # enabled by default, disable if your image is small and you want faster builds
          maximize_build_space: true

  iso:
    name: Build ISO
    needs: bluebuild
    if: github.event_name != 'pull_request'
    # NOTE: when calling a reusable workflow with `uses:` at the job level,
    # you CANNOT have `runs-on:` or `steps:` in this job — the reusable
    # workflow defines those itself.
    permissions:
      contents: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
          # - recipe-macbook.yml   # uncomment when that recipe is stable
    uses: blue-build/github-workflow-templates/.github/workflows/reusable-iso.yml@v1
    with:
      recipe: ${{ matrix.recipe }}
      cosign_public_key: cosign.pub
    secrets:
      registry_token: ${{ github.token }}
      cosign_private_key: ${{ secrets.SIGNING_SECRET }}
      cosign_private_key_password: ${{ secrets.SIGNING_SECRET_PASSWORD }}

  # Optional: upload the ISO to a GitHub Release on main-branch builds.
  # This is a separate job because the `iso` job above calls a reusable
  # workflow and can't mix in regular steps.
  release:
    name: Upload ISO to Release
    needs: iso
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          pattern: "*.iso"
          merge-multiple: true
          path: ./
      - name: Upload ISO to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.iso"
          tag_name: iso-${{ github.run_id }}
          name: ISO Build ${{ github.run_id }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
