name: Build anubis-os images
on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "files/**"
      - "modules/**"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  # ── 1. Build & push container images ──────────────────────────────────────
  build:
    name: Build (${{ matrix.recipe }})
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
          - recipe-macbook.yml
    uses: blue-build/github-workflow-templates/.github/workflows/reusable-build.yml@v1
    with:
      recipe: recipes/${{ matrix.recipe }}
      cosign_public_key: cosign.pub
    secrets:
      cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
      cosign_private_key_password: ${{ secrets.COSIGN_PRIVATE_KEY_PASSWORD }}
      registry_token: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Gerar ISO via github-action (controle total do artifact name) ───────
  iso:
    name: ISO (${{ matrix.artifact }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate ISO
        uses: blue-build/github-action@v1
        with:
          recipe: recipes/${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          cosign_private_key_password: ${{ secrets.COSIGN_PRIVATE_KEY_PASSWORD }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          generate_iso: true

      # O github-action salva a ISO em ./output/ — empacotamos com nome fixo
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: output/*.iso
          retention-days: 7
          if-no-files-found: error

  # ── 3. Re-upload com nome limpo + attach a releases em tags ───────────────
  upload-iso:
    name: Upload ISO (${{ matrix.artifact }})
    needs: iso
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
    permissions:
      contents: write
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: iso-out

      - name: Upload ISO como workflow artifact (7 dias)
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.artifact }}
          path: iso-out/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Attach ISO ao GitHub Release (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iso-out/*.iso
          fail_on_unmatched_files: true
