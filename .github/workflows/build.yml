name: Build anubis-os images

on:
  push:
    branches:
      - main
    paths:
      - "recipes/**"
      - "scripts/**"
      - "files/**"
      - "modules/**"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    name: Build (anubis-os)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                     /usr/local/.ghcup /opt/hostedtoolcache 2>/dev/null || true
          sudo apt-get clean
          sudo docker system prune -af --volumes 2>/dev/null || true
          echo "After:"
          df -h /

      - name: Build image
        uses: blue-build/github-action@v1
        with:
          recipe: recipes/recipe.yml
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          cosign_password: ${{ secrets.COSIGN_PASSWORD }}

      - name: Smoke test
        run: |
          set -e
          IMAGE="ghcr.io/${{ github.repository_owner }}/anubis-os:latest"
          echo "Pulling $IMAGE ..."
          sudo docker pull "$IMAGE" || skopeo copy "docker://$IMAGE" "docker-daemon:$IMAGE"
          echo "Verifying branding ..."
          sudo docker run --rm "$IMAGE" cat /usr/lib/os-release | grep -E '^(NAME|ID|ID_LIKE)='
          if ! sudo docker run --rm "$IMAGE" cat /usr/lib/os-release | grep -q 'ID=anubis-os'; then
            echo "FAIL: image os-release is not Anubis-branded"
            exit 1
          fi
          echo "Smoke test OK."
