name: Build anubis-os images

on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "files/**"
      - "modules/**"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 6 * * 1"   # weekly rebuild to pick up upstream/base updates
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.recipe }})
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
          - recipe-macbook.yml
    uses: blue-build/github-workflow-templates/.github/workflows/reusable-build.yml@v1
    with:
      recipe: recipes/${{ matrix.recipe }}
      cosign_public_key: cosign.pub
    secrets:
      cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
      cosign_private_key_password: ${{ secrets.COSIGN_PRIVATE_KEY_PASSWORD }}
      registry_token: ${{ secrets.GITHUB_TOKEN }}

  iso:
    name: Build ISO (${{ matrix.recipe }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml
          - recipe-macbook.yml
    uses: blue-build/github-workflow-templates/.github/workflows/reusable-iso.yml@v1
    with:
      recipe: recipes/${{ matrix.recipe }}

  upload-iso:
    name: Upload ISO (${{ matrix.recipe }})
    needs: iso
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
    permissions:
      contents: write   # needed to create/update releases on tag pushes
    steps:
      # The reusable-iso workflow uploads the ISO under a name derived from
      # the image name in the recipe. Download it by that name.
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: iso-out

      # Always upload as a workflow artifact — available for 7 days,
      # visible in the Actions run UI without any auth.
      - name: Upload ISO as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.artifact }}
          path: iso-out/*.iso
          retention-days: 7
          if-no-files-found: error

      # On a tag push (v*), also attach to a GitHub Release so ISOs are
      # permanently downloadable. Creates the release if it doesn't exist yet.
      # To cut a release: git tag v1.0.0 && git push origin v1.0.0
      - name: Attach ISO to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iso-out/*.iso
          fail_on_unmatched_files: true
