name: Build anubis-os images
on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "files/**"
      - "modules/**"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  # ── 1. Build & push container images ──────────────────────────────────────
  build:
    name: Build (${{ matrix.recipe }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: blue-build/github-action@v1
        with:
          recipe: recipes/${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          cosign_private_key_password: ${{ secrets.COSIGN_PRIVATE_KEY_PASSWORD }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}

  # ── 2. Gerar ISO (somente após o build ter concluído) ─────────────────────
  iso:
    name: ISO (${{ matrix.artifact }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate ISO
        uses: blue-build/github-action@v1
        with:
          recipe: recipes/${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.COSIGN_PRIVATE_KEY }}
          cosign_private_key_password: ${{ secrets.COSIGN_PRIVATE_KEY_PASSWORD }}
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          generate_iso: true

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: output/*.iso
          retention-days: 7
          if-no-files-found: error

  # ── 3. Re-upload limpo + attach em releases de tags ───────────────────────
  upload-iso:
    name: Upload ISO (${{ matrix.artifact }})
    needs: iso
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: iso-out

      - name: Upload como workflow artifact (7 dias)
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.artifact }}
          path: iso-out/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Attach ao GitHub Release (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iso-out/*.iso
          fail_on_unmatched_files: true
