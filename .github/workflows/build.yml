name: Build anubis-os images
on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "files/**"
      - "modules/**"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.recipe }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        uses: blue-build/github-action@v1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ""
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          pr_event_number: ${{ github.event.number }}
          build_opts: "--no-sign"

  iso:
    name: ISO (${{ matrix.artifact }})
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - recipe: recipe.yml
            artifact: anubis-os
            image: ghcr.io/${{ github.repository_owner }}/anubis-os
          - recipe: recipe-macbook.yml
            artifact: anubis-os-macbook
            image: ghcr.io/${{ github.repository_owner }}/anubis-os-macbook
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BlueBuild CLI
        run: |
          sudo docker create --name blue-build-installer ghcr.io/blue-build/cli:v0.9-installer
          sudo docker cp blue-build-installer:/out/bluebuild /usr/bin/bluebuild
          sudo docker rm blue-build-installer
          bluebuild --version

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate ISO
        run: |
          mkdir -p iso-out
          sudo bluebuild generate-iso \
            --output-dir iso-out \
            --iso-name ${{ matrix.artifact }}.iso \
            image ${{ matrix.image }}:latest

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: iso-out/*.iso
          retention-days: 7
          if-no-files-found: error

  upload-iso:
    name: Upload ISO (${{ matrix.artifact }})
    needs: iso
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: anubis-os
          - artifact: anubis-os-macbook
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: iso-out

      - name: Upload como workflow artifact (7 dias)
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.artifact }}
          path: iso-out/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Attach ao GitHub Release (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iso-out/*.iso
          fail_on_unmatched_files: true
