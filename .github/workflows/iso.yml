name: Build anubis-os ISOs
on:
  workflow_dispatch:
    inputs:
      image:
        description: "Qual imagem gerar ISO"
        required: true
        default: "ambas"
        type: choice
        options:
          - ambas
          - anubis-os
          - anubis-os-macbook

jobs:
  iso:
    name: ISO (${{ matrix.artifact }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: anubis-os
          - artifact: anubis-os-macbook
    # Roda só a imagem selecionada, ou ambas se "ambas"
    if: >
      github.event.inputs.image == 'ambas' ||
      github.event.inputs.image == matrix.artifact
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install BlueBuild CLI
        run: |
          sudo docker create --name blue-build-installer ghcr.io/blue-build/cli:v0.9-installer
          sudo docker cp blue-build-installer:/out/bluebuild /usr/bin/bluebuild
          sudo docker rm blue-build-installer
          bluebuild --version

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate ISO
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.artifact }}:latest"
          mkdir -p iso-out
          sudo bluebuild generate-iso \
            --output-dir iso-out \
            --iso-name ${{ matrix.artifact }}.iso \
            image "$IMAGE"

      - name: Upload ISO artifact (7 dias)
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.artifact }}
          path: iso-out/*.iso
          retention-days: 7
          if-no-files-found: error

      - name: Attach ao GitHub Release (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: iso-out/*.iso
          fail_on_unmatched_files: true
