# 80-anubis-hardening.conf
# NOT applied automatically — this file ships in /etc/sysctl.d/ but most
# of these are commented out by default; `ujust enable-hardened-profile`
# uncomments/applies the active subset via a templated copy at runtime
# (see modules/scripts/set-permissions.sh for the toggle mechanism).
#
# Reference baseline (secureblue-style):
# kernel.kptr_restrict=2
# kernel.dmesg_restrict=1
# kernel.unprivileged_bpf_disabled=1
# net.core.bpf_jit_harden=2
# kernel.yama.ptrace_scope=2
# fs.protected_symlinks=1
# fs.protected_hardlinks=1
# fs.protected_fifos=2
# fs.protected_regular=2
