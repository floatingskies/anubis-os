<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- Circular refresh arrows -->
  <!-- Top arc arrow -->
  <path d="M 20 18 A 14 14 0 0 1 44 18" fill="none"
        stroke="url(#arrow)" stroke-width="4" stroke-linecap="round"/>
  <!-- Top arrowhead -->
  <polygon points="44,11 44,22 53,16" fill="#a78bfa"/>

  <!-- Bottom arc arrow -->
  <path d="M 44 46 A 14 14 0 0 1 20 46" fill="none"
        stroke="url(#arrow)" stroke-width="4" stroke-linecap="round"/>
  <!-- Bottom arrowhead -->
  <polygon points="20,53 20,42 11,48" fill="#a78bfa"/>

  <!-- Center star / sparkle -->
  <circle cx="32" cy="32" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="32" cy="32" r="3" fill="#8b5cf6"/>
</svg>
