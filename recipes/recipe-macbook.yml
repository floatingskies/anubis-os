# recipes/recipe-macbook.yml
# anubis-os, older Intel MacBook Air hardware-enablement variant.
#
# Scope: MacBook Air 2013 / 2015 / 2017 — all pre-T2 chip, so this is
# much simpler than later T2 models: Broadcom Wi-Fi is the one thing
# that doesn't "just work" out of the box on these machines.
#
# FaceTime HD webcam support was dropped: the only COPR repo this recipe
# referenced (dani/facetimehd) no longer exists, and there is no actively
# maintained drop-in replacement that's been verified safe for an
# unattended image build. Revisit if/when a maintained driver is confirmed.
#
# Apple Silicon MacBook Airs (M1/M2/M3) are out of scope — see README.

name: anubis-os-macbook
description: anubis-os tuned for 2013/2015/2017 Intel MacBook Air (Broadcom Wi-Fi)
base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:

  # ---------------------------------------------------------------------
  # 1. Freeworld codecs & drivers
  #    RPM Fusion is already enabled in the ublue-os/silverblue-main base
  #    image. However the base image also ships a `fedora-multimedia` repo
  #    from negativo17.org which 404s on Fedora 42 and causes every dnf
  #    operation to fail. Disable it first, then install from RPM Fusion.
  # ---------------------------------------------------------------------
  - type: script
    snippets:
      # The base image ships a negativo17 fedora-multimedia repo that 404s
      # on Fedora 42. Remove it, then install the RPM Fusion release RPMs
      # directly by URL so their repos are available for all later steps.
      - echo 'cache-bust-2'
      - grep -rl 'negativo17.org' /etc/yum.repos.d/ | xargs rm -f
      - VER=$(rpm -E %fedora) && rpm-ostree install --idempotent https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-${VER}.noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-${VER}.noarch.rpm

  - type: rpm-ostree
    install:
      - ffmpeg

  # ---------------------------------------------------------------------
  # 2. Broadcom Wi-Fi (every MacBook Air in this range uses Broadcom)
  #    kmod-wl from RPM Fusion is a prebuilt module for the stock Fedora
  #    kernel. akmod-wl refuses to build in container builds (runs as root),
  #    so we use the prebuilt kmod-wl + broadcom-wl firmware instead.
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - kmod-wl
      - broadcom-wl

  - type: rpm-ostree
    install:
      - fwupd
      - bluez

  # ---------------------------------------------------------------------
  # 3. Gaming
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gamescope
      - gamemode
      - mangohud
      - lutris
      - wine
      - winetricks
      - fastfetch        # branded system-info banner, see files module below

  # ---------------------------------------------------------------------
  # 4. Everyday user security (NOT pentesting tools — defensive/privacy
  #    tools only, suitable for a general-purpose gaming desktop).
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - rkhunter
      - aide
      - firejail

  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - com.valvesoftware.Steam
        - org.gimp.GIMP
        - org.inkscape.Inkscape
        - com.github.PintaProject.Pinta
        - org.onlyoffice.desktopeditors
        - com.brave.Browser

  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Logo Menu
      - Caffeine
      - PaperWM

  - type: brew

  # ---------------------------------------------------------------------
  # Wallpapers, dconf defaults, ujust files, first-boot wallpaper unit,
  # Anubis logo (icon theme + pixmaps, used by the os-release LOGO= field
  # below) and fastfetch branding (ASCII logo + config), shared with the
  # main recipe.yml via the same files/system/ tree.
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - set-permissions.sh
      - enable-first-boot-units.sh
      - enable-gnome-extensions-defaults.sh

  # ---------------------------------------------------------------------
  # Enable the first-boot unit that seeds the fastfetch config into any
  # pre-existing user home directories (skel only covers brand-new
  # accounts created after this image is built).
  # ---------------------------------------------------------------------
  - type: systemd
    system:
      enabled:
        - anubis-fastfetch-firstboot.service

  # ---------------------------------------------------------------------
  # Branding — rename from "Fedora Silverblue" to "Anubis Linux 44".
  # Same rationale and field set as the main recipe.yml: ID/ID_LIKE are
  # deliberately left untouched to avoid breaking COPR resolution for the
  # kmod-wl / akmods modules above, so this runs near the very end.
  # ---------------------------------------------------------------------
  - type: os-release
    properties:
      NAME: "Anubis Linux"
      PRETTY_NAME: "Anubis Linux 44"
      VARIANT: "Anubis Linux"
      VARIANT_ID: anubis-os
      LOGO: anubis-logo
      HOME_URL: "https://github.com/floatingskies/anubis-os"
      DEFAULT_HOSTNAME: "anubis"

  - type: signing

# Note: low-power/battery tuning (TLP, power-profiles-daemon) is worth
# adding explicitly for 2013-era hardware where battery life matters more
# than on current machines — consider a `power-profiles-daemon` + `tlp`
# module addition once the base image boots and is verified on real
# hardware, rather than guessing settings blind here.
