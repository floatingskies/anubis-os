# recipes/recipe-macbook.yml
# anubis-os — variante para Intel MacBook Air 2013/2015/2017 (pré-T2)

name: anubis-os-macbook
description: anubis-os tuned for 2013/2015/2017 Intel MacBook Air (Broadcom Wi-Fi)
base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:

  # ---------------------------------------------------------------------
  # 1. Remover repo negativo17 quebrado no Fedora 44
  # ---------------------------------------------------------------------
  - type: script
    snippets:
      - grep -rl 'negativo17.org' /etc/yum.repos.d/ | xargs rm -f

  - type: rpm-ostree
    install:
      - ffmpeg

  # ---------------------------------------------------------------------
  # 2. Broadcom Wi-Fi (MacBook Air 2013-2017)
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - kmod-wl
      - broadcom-wl

  # ---------------------------------------------------------------------
  # 3. Hardware geral
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - fwupd
      - bluez

  # ---------------------------------------------------------------------
  # 4. Gaming
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gamescope
      - gamemode
      - mangohud

  # ---------------------------------------------------------------------
  # 5. Ferramentas de pentesting leves
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - nmap
      - nmap-ncat
      - whois
      - curl
      - wget
      - traceroute
      - net-tools

  # ---------------------------------------------------------------------
  # 6. Everyday user security
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - rkhunter
      - aide
      - firejail

  # ---------------------------------------------------------------------
  # 7. Terminal / shell enhancements
  # ---------------------------------------------------------------------   
  - type: rpm-ostree
    install:
      - fastfetch  # ---------------------------------------------------------------------
  # 8. Flatpaks — baked into the image at build time
  # ---------------------------------------------------------------------
  - type: default-flatpaks@v1
    notify: true
    system:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      install:
        - com.valvesoftware.Steam
        - net.lutris.Lutris
        - org.ppsspp.PPSSPP
        - net.pcsx2.PCSX2
        - org.DolphinEmu.dolphin-emu
        - org.gimp.GIMP
        - org.inkscape.Inkscape
        - com.github.PintaProject.Pinta
        - org.onlyoffice.desktopeditors
        - com.brave.Browser
        - com.mattjakeman.ExtensionManager
        - net.nokyan.Resources
        - org.gnome.Boxes
        - io.github.flattool.Warehouse
        - io.gitlab.adhami3310.Impression
        - app.devsuite.Ptyxis
        - io.github.kolunmi.Bazaar

  # ---------------------------------------------------------------------
  # 9. GNOME extensions
  # ---------------------------------------------------------------------
  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Logo Menu
      - Caffeine
      - PaperWM

# ---------------------------------------------------------------------
  # 9. Homebrew
  # ---------------------------------------------------------------------
  - type: brew
  # ---------------------------------------------------------------------
  # 11. Arquivos do sistema
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - enable-first-boot-units.sh
      - setup-hostname.sh
      - setup-os-release.sh
      - setup-logo.sh
      - setup-plymouth.sh
      - setup-wallpaper.sh
      - setup-ohmybash.sh
      - enable-gnome-extensions-defaults.sh
      - set-permissions.sh

  # ---------------------------------------------------------------------
  # 12. Signing
  # ---------------------------------------------------------------------
  - type: signing
