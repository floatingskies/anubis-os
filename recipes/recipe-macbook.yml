# recipes/recipe-macbook.yml
# anubis-os — variante para Intel MacBook Air 2013/2015/2017 (pré-T2).
# O único hardware que não funciona out-of-the-box é o Wi-Fi Broadcom.

name: anubis-os-macbook
description: anubis-os tuned for 2013/2015/2017 Intel MacBook Air (Broadcom Wi-Fi)
base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:

  # ---------------------------------------------------------------------
  # 1. Remover repo negativo17 quebrado no Fedora 44.
  #    RPM Fusion já vem habilitado na base image — ffmpeg instala direto.
  # ---------------------------------------------------------------------
  - type: script
    snippets:
      - grep -rl 'negativo17.org' /etc/yum.repos.d/ | xargs rm -f

  - type: rpm-ostree
    install:
      - ffmpeg

  # ---------------------------------------------------------------------
  # 2. Broadcom Wi-Fi (MacBook Air 2013-2017)
  #    kmod-wl é o módulo prebuilt do RPM Fusion para o kernel Fedora.
  #    akmod-wl não funciona em container builds.
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - kmod-wl
      - broadcom-wl

  # ---------------------------------------------------------------------
  # 3. Hardware geral
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - fwupd
      - bluez

  # ---------------------------------------------------------------------
  # 4. Gaming
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gamescope
      - gamemode
      - mangohud
      - lutris
      - wine
      - winetricks

  # ---------------------------------------------------------------------
  # 5. Everyday user security
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - rkhunter
      - aide
      - firejail

  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - com.valvesoftware.Steam
        - org.gimp.GIMP
        - org.inkscape.Inkscape
        - com.github.PintaProject.Pinta
        - org.onlyoffice.desktopeditors
        - com.brave.Browser

  # ---------------------------------------------------------------------
  # 6. GNOME extensions
  # ---------------------------------------------------------------------
  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Logo Menu
      - Caffeine
      - PaperWM

  # ---------------------------------------------------------------------
  # 7. Homebrew
  # ---------------------------------------------------------------------
  - type: brew

  # ---------------------------------------------------------------------
  # 8. Arquivos do sistema (wallpapers, dconf, ujust, units)
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - set-permissions.sh
      - enable-first-boot-units.sh
      - enable-gnome-extensions-defaults.sh

  # ---------------------------------------------------------------------
  # 9. Signing
  # ---------------------------------------------------------------------
  - type: signing
