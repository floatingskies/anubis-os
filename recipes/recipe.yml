# recipes/recipe.yml
# anubis-os — minimal/DIY GNOME-core desktop, gaming + everyday user security
# (NOT pentesting), broad x86_64 hardware support (1st-gen Intel Core through
# current, all AMD64). No custom kernel — stock Fedora kernel + tuned/sysctl
# optimizations only. No Flatpaks — rpm-only, gnome-core app set.

name: anubis-os
description: GNOME-core-based DIY gaming & security-focused immutable Fedora (Universal Blue)
base-image: ghcr.io/ublue-os/silverblue-main   # GNOME ostree base
image-version: "44"

modules:

  # ---------------------------------------------------------------------
  # 1. Freeworld codecs & drivers
  #    RPM Fusion is already enabled in the ublue-os/silverblue-main base
  #    image. However the base image also ships a `fedora-multimedia` repo
  #    from negativo17.org which 404s on Fedora 42 and causes every dnf
  #    operation to fail. Disable it first, then install from RPM Fusion.
  # ---------------------------------------------------------------------
  - type: script
    snippets:
      # The base image ships a negativo17 fedora-multimedia repo that 404s
      # on Fedora 42. Remove it, then install the RPM Fusion release RPMs
      # directly by URL so their repos are available for all later steps.
      - echo 'cache-bust-2'
      - grep -rl 'negativo17.org' /etc/yum.repos.d/ | xargs rm -f
      - VER=$(rpm -E %fedora) && rpm-ostree install --idempotent https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-${VER}.noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-${VER}.noarch.rpm

  - type: rpm-ostree
    install:
      - ffmpeg

  # ---------------------------------------------------------------------
  # 2. Performance optimizations WITHOUT a custom kernel.
  #    We stay on the stock Fedora kernel from the base image for maximum
  #    hardware compatibility (1st-gen Intel Core and up). Instead we use
  #    userspace/tunable-level optimizations: tuned (with a gaming-leaning
  #    profile active), irqbalance, and scx-scheds (sched-ext schedulers,
  #    which load as kernel modules at runtime via akmods/scx and do NOT
  #    require a custom kernel build, only a kernel with sched-ext support
  #    which Fedora's stock kernel has since 6.12).
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - tuned
      - tuned-ppd
      - irqbalance
      - scx-scheds
      - gamemode
      - mangohud

  - type: script
    snippets:
      - systemctl enable tuned.service
      - systemctl enable irqbalance.service

  # ---------------------------------------------------------------------
  # 3. Automatic hardware enablement
  #    Broadcom Wi-Fi: we use RPM Fusion's akmod-wl, which builds locally
  #    for whatever kernel is running via the akmods systemd service.
  #    fwupd handles firmware updates automatically.
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:      - fwupd                 # automatic firmware updates (BIOS/EC/peripheral)
      - NetworkManager        # already in base, kept explicit for clarity
      - bluez                 # Bluetooth auto-detect/pairing
      - plymouth              # boot splash (theme applied in setup-plymouth.sh)
      - plymouth-plugin-script
      - dracut-tools          # provides lsinitrd, used to verify the theme baked in

  # ---------------------------------------------------------------------
  # 4. Gaming support (rpm-only, no Flatpak)
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gamescope
      - lutris
      - vkbasalt

  # ---------------------------------------------------------------------
  # 5. DIY / minimal GNOME-core application set.
  #    Strip the base image down to gnome-core plus a small, intentional
  #    set of rpm apps: gedit (text editor), ptyxis (terminal — installed
  #    as an RPM here, NOT as a Flatpak, replacing any base-image Flatpak
  #    version), and Firefox (default/only browser, replacing Brave).
  #    All Flatpaks have been removed — this distro is rpm/ostree only.
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gnome-core
      - gedit
      - ptyxis
      - firefox

  - type: script
    snippets:
      # Remove the Flatpak version of Ptyxis shipped by the base image so
      # the rpm-ostree package above is the only copy installed. Safe
      # no-op if it isn't present. We keep Flathub itself enabled (see
      # the `default-flatpaks` module below) in case the user wants to
      # install something from it later — it just ships with nothing
      # pre-installed.
      - flatpak uninstall -y --noninteractive app/org.gnome.Ptyxis/x86_64/stable || true

# ---------------------------------------------------------------------
  # 6. Flathub remote — kept enabled "just in case" but with nothing
  #    pre-installed.
  # ---------------------------------------------------------------------
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        repo:
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
        install: []

  # ---------------------------------------------------------------------
  # 7. Everyday user security (NOT pentesting tools — defensive/privacy
  #    tools only, suitable for a general-purpose gaming desktop).
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - clamav-update
      - rkhunter
      - aide
      - firejail
      - opensnitch

  # ---------------------------------------------------------------------
  # 8. GNOME desktop extensions — dash-to-dock, AppIndicator/legacy tray,
  #    Blur My Shell, a logo/app menu (Arc Menu), Caffeine, PaperWM.
  # ---------------------------------------------------------------------
  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Arc Menu
      - Caffeine
      - PaperWM
    # NOTE: this module only installs the extension files — it does not
    # enable them. Enabling is done via a dconf default override shipped
    # by the `files` module below (see
    # files/system/etc/dconf/db/local.d/00-anubis-extensions and the
    # matching dconf-update script).

  # ---------------------------------------------------------------------
  # 9. Homebrew (brew-oci layer) — kept as requested.
  # ---------------------------------------------------------------------
  - type: brew

  # ---------------------------------------------------------------------
  # 10. Wallpapers, dconf defaults, ujust files, first-boot wallpaper unit
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - set-permissions.sh
      - enable-first-boot-units.sh
      - enable-gnome-extensions-defaults.sh
      - setup-logo.sh
      # setup-logo.sh swaps Fedora's stock branding for anubis-logo.png:
      #   - GDM/login & lock screen logo (org.gnome.login-screen `logo`
      #     key, set via the dconf override shipped in
      #     files/system/etc/dconf/db/local.d/01-anubis-gdm-logo — the
      #     keyfile points at /usr/share/pixmaps/anubis-logo.png)
      #   - /usr/share/pixmaps/fedora_logo_med.png and
      #     fedora_whitelogo_med.png (used by various GTK/GNOME "About"
      #     and distro-branding surfaces that hardcode the Fedora names)
      #   - the Logo Menu GNOME Shell extension's logo.png / logo.svg
      - setup-plymouth.sh
      # setup-plymouth.sh installs the Anubis boot-splash theme and, the
      # part that actually matters, rebuilds the initramfs via
      # `plymouth-set-default-theme -R` so the theme is baked into the
      # image this build produces (and therefore reapplied on every
      # future rpm-ostree rebase/update too, since this script reruns on
      # every image build, not just the first install).
      - setup-wallpaper.sh
      # setup-wallpaper.sh strips Fedora/GNOME stock wallpapers, verifies
      # the Anubis wallpapers + gnome-background-properties XML shipped
      # by the files module (so they show up as proper named entries in
      # Settings > Background, not just a default picture-uri), and sets
      # the default wallpaper for new users, the screensaver/lock screen,
      # and GDM.

  # ---------------------------------------------------------------------
  # 11. Signing
  # ---------------------------------------------------------------------
  - type: signing
