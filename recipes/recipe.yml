# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# =============================================================================
#  Anubis OS - recipe.yml  (KDE / Kinoite edition)
#  RECIPE VERSION: v8-final (2026-07-02)
#  This file was verified on 2026-07-02 against Fedora 44 package list.
# =============================================================================
name: anubis-os
description: >-
  CachyOS-flavoured, security-focused, gaming-ready immutable Fedora with a
  DIY KDE Plasma 6 desktop, modern CLI toolbelt, Homebrew layer, ujust
  management, and <=1.5 GB idle RAM. RPM-only base, broad x86_64 support.
base-image: ghcr.io/ublue-os/kinoite-main
image-version: "44"

modules:

  # ===========================================================================
  #  A. COPR setup (ublue pattern: enable -> install -> disable)
  #  RPM Fusion is NOT used - ublue uses negativo17 fedora-multimedia (already
  #  in the kinoite-main base image).
  # ===========================================================================
  - type: script
    snippets:
      - |
        set -ouex pipefail
        dnf5 -y copr enable bieszczaders/kernel-cachyos-addons
        dnf5 -y install scx-scheds
        dnf5 -y copr disable bieszczaders/kernel-cachyos-addons

  # ===========================================================================
  #  B. Codecs + multimedia (Fedora 44 verified package names)
  #  - gstreamer1-vaapi: REMOVED - obsoleted by gstreamer1-plugins-bad-free
  #    on F44 (gstreamer1-plugins-bad-free-1.28.4 obsoletes gstreamer1-vaapi < 1.26.11-2)
  #  - libva-intel-media-driver: Fedora free VAAPI driver (Intel Gen 8+)
  #  - intel-vaapi-driver: legacy i965 driver (renamed from libva-intel-driver)
  #  - libva-vdpau-driver: RETIRED on F43+ - DO NOT INSTALL
  # ===========================================================================
  - type: rpm-ostree
    install:
      - ffmpeg
      - ffmpeg-libs
      - gstreamer1-plugins-base
      - gstreamer1-plugins-good
      - gstreamer1-plugins-bad-free
      - gstreamer1-plugins-ugly-free
      - gstreamer1-libav
      - libva
      - libva-intel-media-driver
      - intel-vaapi-driver
      - pipewire
      - pipewire-alsa
      - pipewire-pulseaudio
      - pipewire-jack-audio-connection-kit
      - wireplumber
      - lame
      - opus
      - flac

  # ===========================================================================
  #  Hardware enablement
  # ===========================================================================
  - type: rpm-ostree
    install:
      - fwupd
      - fwupd-efi
      - NetworkManager
      - NetworkManager-wifi
      - NetworkManager-bluetooth
      - bluez
      - bluez-cups
      - plymouth
      - plymouth-plugin-script
      - plymouth-system-theme
      - dracut-tools
      - iwd
      - bolt
      - mcelog
      - thermald
      - smartmontools
      - udisks2
      - upower

  # ===========================================================================
  #  C. Performance daemons (scx-scheds installed in stage A via COPR)
  # ===========================================================================
  - type: rpm-ostree
    install:
      - tuned
      - tuned-ppd
      - tuned-utils
      - irqbalance
      - gamemode
      - gamemode-devel
      - mangohud
      - vkbasalt
      - earlyoom
      - nohang
      - zram-generator

  - type: script
    snippets:
      - systemctl enable tuned.service
      - systemctl enable tuned-ppd.service
      - systemctl enable irqbalance.service
      - systemctl enable earlyoom.service
      - systemctl enable nohang.service
      - systemctl enable thermald.service || true
      - systemctl mask power-profiles-daemon.service || true

  # ===========================================================================
  #  D. CLI toolbelt
  # ===========================================================================
  - type: rpm-ostree
    install:
      - bash-completion
      - zsh
      - fish
      - tmux
      - screen
      - eza
      - bat
      - fd-find
      - ripgrep
      - fzf
      - zoxide
      - delta
      - dust
      - procs
      - sd
      - bottom
      - btop
      - bandwhich
      - gping
      - xh
      - tealdeer
      - direnv
      - starship
      - p7zip
      - p7zip-plugins
      - unrar
      - unzip
      - zip
      - zstd
      - xz
      - bzip2
      - rsync
      - mtr
      - iperf3
      - nmap-ncat
      - bind-utils
      - whois
      - tcpdump
      - socat
      - jq
      - yq
      - xmllint
      - fastfetch
      - inxi
      - flatpak-spawn
      - strace
      - ltrace
      - perf
      - numactl
      - hwinfo
      - lshw
      - pciutils
      - usbutils
      - dmidecode
      - neovim
      - helix
      - git
      - git-delta
      - tig
      - lazygit

  # ===========================================================================
  #  E. Development tooling
  # ===========================================================================
  - type: rpm-ostree
    install:
      - podman
      - podman-compose
      - podman-docker
      - buildah
      - skopeo
      - distrobox
      - toolbox
      - flatpak-builder
      - qemu-kvm
      - libvirt
      - virt-install
      - virt-manager
      - gh
      - glab
      - code
      - python3
      - python3-pip
      - python3-devel
      - nodejs
      - npm
      - yarnpkg
      - rust
      - cargo
      - go
      - make
      - cmake
      - ninja-build
      - gcc
      - gcc-c++
      - clang
      - kernel-devel
      - kernel-headers

  # ===========================================================================
  #  F. Gaming (wine removed - use Flatpak Bottles or Distrobox)
  # ===========================================================================
  - type: rpm-ostree
    install:
      - gamescope
      - mangoapp
      - goverlay

  # ===========================================================================
  #  G. KDE Plasma 6 desktop
  #  - ksysguard retired -> plasma-systemmonitor
  #  - plasma-discover NOT installed (Bazaar is the default app store)
  #  - plasma-login-manager added (F44+ display manager)
  # ===========================================================================
  - type: rpm-ostree
    install:
      - plasma-desktop
      - plasma-workspace
      - plasma-workspace-wayland
      - plasma-nm
      - plasma-pa
      - plasma-firewall
      - plasma-systemmonitor
      - plasma-browser-integration
      - plasma-pkcert
      - kscreen
      - sddm
      - sddm-kcm
      - sddm-theme-breeze
      - plasma-login-manager
      - kwin
      - kinfocenter
      - kio-fuse
      - kio-extras
      - kde-gtk-config
      - kdegraphics-thumbnailers
      - kimageformats
      - qt6-qtimageformats
      - qt6-qtwayland
      - kvantum
      - kvantum-qt6
      - layer-shell-qt
      - kcron
      - kfind
      - kmenuedit
      - kwrite
      - kate
      - dolphin
      - dolphin-plugins
      - konsole
      - okular
      - gwenview
      - spectacle
      - kcalc
      - krdc
      - kcharselect
      - kgpg
      - ark
      - filelight
      - ksystemlog
      - kdebugsettings
      - milou
      - kdialog
      - google-noto-sans-fonts
      - google-noto-sans-cjk-fonts
      - google-noto-sans-cjk-ttc-fonts
      - google-noto-serif-fonts
      - google-noto-mono-fonts
      - google-noto-emoji-fonts
      - fira-code-fonts
      - jetbrains-mono-fonts
      - cascadia-code-fonts
      - hack-fonts
      - inter-fonts
      - firefox

  # ===========================================================================
  #  H. Security
  # ===========================================================================
  - type: rpm-ostree
    install:
      - firewalld
      - firewalld-config
      - firewall-config
      - firejail
      - firejail-profiles
      - usbguard
      - usbguard-dconf
      - usbguard-selinux
      - clamav
      - clamav-update
      - clamav-unofficial-sigs
      - rkhunter
      - aide
      - polkit

  - type: script
    snippets:
      - systemctl enable firewalld.service
      - systemctl enable usbguard.service
      - systemctl enable clamav-freshclam.service || true

  # ===========================================================================
  #  H2. Anaconda WebUI Live installer
  # ===========================================================================
  - type: rpm-ostree
    install:
      - anaconda-webui
      - anaconda-install-env-deps
      - anaconda-dracut
      - initial-setup
      - initial-setup-gui
      - lorax
      - lorax-composer
      - pykickstart
      - livecd-tools

  # ===========================================================================
  #  I. Homebrew
  # ===========================================================================
  - type: brew

  # ===========================================================================
  #  J. Pre-baked Flatpaks
  # ===========================================================================
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - com.valvesoftware.Steam
          - com.valvesoftware.Steam.Utility.MangoHud
          - net.lutris.Lutris
          - org.libretro.RetroArch
          - com.usebottles.bottles
          - com.visualstudio.code
          - org.libreoffice.LibreOffice
          - org.kde.kdenlive
          - io.github.kolunmi.Bazaar
          - io.github.getnf.embellish
          - org.gimp.GIMP
          - org.inkscape.Inkscape
          - net.nokyan.Resources
          - com.ranfdev.DistroShelf

  # ===========================================================================
  #  K. Static files
  # ===========================================================================
  - type: files
    files:
      - source: files
        destination: /

  # ===========================================================================
  #  L. Build-time scripts
  # ===========================================================================
  - type: script
    scripts:
      - setup-os-release.sh
      - setup-hostname.sh
      - setup-logo.sh
      - setup-plymouth.sh
      - setup-wallpaper.sh
      - setup-kde-defaults.sh
      - setup-bazaar-default.sh
      - setup-performance.sh
      - setup-ohmybash.sh
      - setup-ujust.sh
      - setup-brew.sh
      - setup-first-boot.sh
      - enable-first-boot-units.sh
      - setup-boot-verify.sh
      - set-permissions.sh

  # ===========================================================================
  #  M. Signing
  # ===========================================================================
  - type: signing
