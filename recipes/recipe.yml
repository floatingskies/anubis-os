# recipes/recipe.yml
# anubis-os — variante genérica (x86_64)

name: anubis-os
description: anubis-os — custom Fedora Silverblue-based image
base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:

  # ---------------------------------------------------------------------
  # 1. Remover repo negativo17 quebrado no Fedora 44
  # ---------------------------------------------------------------------
  - type: script
    snippets:
      - grep -rl 'negativo17.org' /etc/yum.repos.d/ | xargs rm -f

  - type: rpm-ostree
    install:
      - ffmpeg
    remove:
      - gnome-software
      - ptyxis                     # Terminal padrão no Fedora Silverblue 40+
      - gnome-terminal             # Terminal padrão em versões anteriores
  # ---------------------------------------------------------------------
  # 2. Hardware geral
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - fwupd
      - bluez

  # ---------------------------------------------------------------------
  # 3. Gaming
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gamescope
      - gamemode
      - mangohud

  # ---------------------------------------------------------------------
  # 4. Ferramentas de pentesting leves
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - nmap
      - nmap-ncat
      - whois
      - curl
      - wget
      - traceroute
      - net-tools

  # ---------------------------------------------------------------------
  # 5. Everyday user security
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - rkhunter
      - aide
      - firejail



  # ---------------------------------------------------------------------
  # 6. Terminal / shell enhancements
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - fastfetch  
  # ---------------------------------------------------------------------
  # 7. Flatpaks — baked into the image at build time so the user never
  #    waits for installation on first boot.
  # ---------------------------------------------------------------------
  - type: default-flatpaks@v1
    notify: true
    system:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      install:
        - com.valvesoftware.Steam
        - net.lutris.Lutris
        - org.ppsspp.PPSSPP
        - net.pcsx2.PCSX2
        - org.DolphinEmu.dolphin-emu
        - org.gimp.GIMP
        - org.inkscape.Inkscape
        - com.github.PintaProject.Pinta
        - org.onlyoffice.desktopeditors
        - com.brave.Browser
        - com.mattjakeman.ExtensionManager
        - net.nokyan.Resources
        - org.gnome.Boxes
        - io.github.flattool.Warehouse
        - io.gitlab.adhami3310.Impression
        - app.devsuite.Ptyxis
        - io.github.kolunmi.Bazaar

  # ---------------------------------------------------------------------
  # 8. GNOME extensions
  # ---------------------------------------------------------------------
  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Logo Menu
      - Caffeine
      - PaperWM

# ---------------------------------------------------------------------
  # 9. Homebrew
  # ---------------------------------------------------------------------
  - type: brew
  # ---------------------------------------------------------------------
  # 10. Arquivos do sistema
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - enable-first-boot-units.sh
      - setup-hostname.sh
      - setup-os-release.sh
      - setup-logo.sh
      - setup-plymouth.sh
      - setup-wallpaper.sh
      - setup-ohmybash.sh
      - enable-gnome-extensions-defaults.sh
      - set-permissions.sh

  # ---------------------------------------------------------------------
  # 11. Signing
  # ---------------------------------------------------------------------
  - type: signing
