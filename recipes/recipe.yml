# recipes/recipe.yml
# anubis-os — GNOME desktop, gaming + everyday user security (NOT pentesting),
# broad x86_64 hardware support (1st-gen Intel Core through current, all AMD64).

name: anubis-os
description: GNOME-based gaming & security-focused immutable Fedora (Universal Blue)
base-image: ghcr.io/ublue-os/silverblue-main   # GNOME ostree base
image-version: "42"

modules:

  # ---------------------------------------------------------------------
  # 1. RPM Fusion
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    repos:
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free.repo
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree.repo
    install:
      - rpmfusion-free-release
      - rpmfusion-nonfree-release
      - ffmpeg
      - mesa-va-drivers-freeworld
      - mesa-vdpau-drivers-freeworld

  # ---------------------------------------------------------------------
  # 2. CachyOS kernel — generic build by default for broad compatibility
  #    (1st-gen Intel Core through current Intel/AMD). CPU-tuned variants
  #    stay opt-in via ujust, never default, so old hardware always boots.
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos/repo/fedora-$releasever/bieszczaders-kernel-cachyos-fedora-$releasever.repo
      - https://copr.fedorainfracloud.org/coprs/bieszczaders/kernel-cachyos-addons/repo/fedora-$releasever/bieszczaders-kernel-cachyos-addons-fedora-$releasever.repo
    install:
      - kernel-cachyos
      - kernel-cachyos-devel
      - scx-scheds

  # ---------------------------------------------------------------------
  # 3. Automatic hardware enablement
  #    Broadcom Wi-Fi covers most older MacBooks (2013/2015/2017) and many
  #    third-party laptops/desktops. fwupd handles firmware updates
  #    automatically; no manual driver hunting should be needed for the
  #    hardware this image targets.
  # ---------------------------------------------------------------------
  - type: akmods
    install:
      - broadcom-wl

  - type: rpm-ostree
    install:
      - fwupd                 # automatic firmware updates (BIOS/EC/peripheral)
      - NetworkManager         # already in base, kept explicit for clarity
      - bluez                 # Bluetooth auto-detect/pairing

  # ---------------------------------------------------------------------
  # 4. SteamOS-style gaming
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - steam
      - gamescope
      - gamemode
      - mangohud
      - lutris
      - wine
      - winetricks
      - vkbasalt
      - corectrl

  - type: default-flatpaks
    notify: true
    system:
      install:
        - net.davidotek.pupgui2          # ProtonUp-Qt
        - com.heroicgameslauncher.hgl
        # --- Creative tools ---
        - org.gimp.GIMP
        - org.inkscape.Inkscape
        - com.github.PintaProject.Pinta
        # --- Office ---
        - org.onlyoffice.desktopeditors
        # --- Browser (default) ---
        - com.brave.Browser

  # ---------------------------------------------------------------------
  # 5. Everyday user security (NOT pentesting tools — defensive/privacy
  #    tools only, suitable for a general-purpose gaming desktop).
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - clamav-update
      - rkhunter
      - aide
      - firejail
      - opensnitch

  # ---------------------------------------------------------------------
  # 6. GNOME desktop extensions — dash-to-dock, AppIndicator/legacy tray,
  #    Blur My Shell, a logo/app menu (Arc Menu), Caffeine, PaperWM.
  # ---------------------------------------------------------------------
  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Arc Menu
      - Caffeine
      - PaperWM
    # NOTE: this module only installs the extension files — it does not
    # enable them. Enabling is done via a dconf default override shipped
    # by the `files` module below (see
    # files/system/etc/dconf/db/local.d/00-anubis-extensions and the
    # matching dconf-update script).

  # ---------------------------------------------------------------------
  # 7. Homebrew (brew-oci layer)
  # ---------------------------------------------------------------------
  - type: brew

  # ---------------------------------------------------------------------
  # 8. Wallpapers, dconf defaults, ujust files, first-boot wallpaper unit
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - set-permissions.sh
      - enable-first-boot-units.sh
      - enable-gnome-extensions-defaults.sh

  # ---------------------------------------------------------------------
  # 9. Signing
  # ---------------------------------------------------------------------
  - type: signing
