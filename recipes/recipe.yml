# recipes/recipe.yml
# anubis-os — GNOME desktop, gaming + everyday user security (NOT pentesting),
# broad x86_64 hardware support (1st-gen Intel Core through current, all AMD64).

name: anubis-os
description: GNOME-based gaming & security-focused immutable Fedora (Universal Blue)
base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:

  # ---------------------------------------------------------------------
  # 1. Remover repo negativo17 quebrado no Fedora 44.
  #    RPM Fusion já vem habilitado na base image — ffmpeg instala direto.
  # ---------------------------------------------------------------------
  - type: script
    snippets:
      - grep -rl 'negativo17.org' /etc/yum.repos.d/ | xargs rm -f

  - type: rpm-ostree
    install:
      - ffmpeg

  # ---------------------------------------------------------------------
  # 2. Hardware geral
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - fwupd
      - NetworkManager
      - bluez

  # ---------------------------------------------------------------------
  # 3. Gaming
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gamescope
      - gamemode
      - mangohud
      - lutris
      - wine
      - winetricks
      - corectrl

  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        - net.davidotek.pupgui2
        - com.valvesoftware.Steam
        - com.heroicgameslauncher.hgl
        - org.gimp.GIMP
        - org.inkscape.Inkscape
        - com.github.PintaProject.Pinta
        - org.onlyoffice.desktopeditors
        - com.brave.Browser

  # ---------------------------------------------------------------------
  # 4. Everyday user security
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - rkhunter
      - aide
      - firejail

  # ---------------------------------------------------------------------
  # 5. GNOME extensions
  # ---------------------------------------------------------------------
  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Logo Menu
      - Caffeine
      - PaperWM

  # ---------------------------------------------------------------------
  # 6. Homebrew
  # ---------------------------------------------------------------------
  - type: brew

  # ---------------------------------------------------------------------
  # 7. Arquivos do sistema (wallpapers, dconf, ujust, units)
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - set-permissions.sh
      - enable-first-boot-units.sh
      - enable-gnome-extensions-defaults.sh

  # ---------------------------------------------------------------------
  # 8. Signing
  # ---------------------------------------------------------------------
  - type: signing
