# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# =============================================================================
#  Anubis OS - recipe.yml  (KDE / Kinoite edition)
#  RECIPE VERSION: v11-final (2026-07-02)
#  All package names verified against Fedora 44 packages.fedoraproject.org.
#  Modules minimized to 6 total to stay under Docker's 127-layer limit.
# =============================================================================
name: anubis-os
description: >-
  CachyOS-flavoured, security-focused, gaming-ready immutable Fedora with a
  DIY KDE Plasma 6 desktop, modern CLI toolbelt, Homebrew layer, ujust
  management, and <=1.5 GB idle RAM. RPM-only base, broad x86_64 support.
base-image: ghcr.io/ublue-os/kinoite-main
image-version: "44"

modules:

  # ===========================================================================
  #  1. ALL RPM packages in a SINGLE module (minimizes Docker layers)
  #  scx-scheds is installed separately in the master script (stage 5) via COPR.
  #
  #  Package names verified against Fedora 44 packages.fedoraproject.org.
  # ===========================================================================
  - type: rpm-ostree
    install:
      # --- Codecs + multimedia ---
      - ffmpeg
      - ffmpeg-libs
      - gstreamer1-plugins-base
      - gstreamer1-plugins-good
      - gstreamer1-plugins-bad-free
      - gstreamer1-plugins-ugly-free
      - gstreamer1-libav
      - libva
      - libva-intel-media-driver
      - intel-vaapi-driver
      - pipewire
      - pipewire-alsa
      - pipewire-pulseaudio
      - pipewire-jack-audio-connection-kit
      - wireplumber
      - lame
      - opus
      - flac
      # --- Hardware enablement ---
      - fwupd
      - fwupd-efi
      - NetworkManager
      - NetworkManager-wifi
      - NetworkManager-bluetooth
      - bluez
      - bluez-cups
      - plymouth
      - plymouth-plugin-script
      - plymouth-system-theme
      - dracut-tools
      - iwd
      - bolt
      - mcelog
      - thermald
      - smartmontools
      - udisks2
      - upower
      # --- Performance daemons ---
      - tuned
      - tuned-ppd
      - tuned-utils
      - irqbalance
      - gamemode
      - gamemode-devel
      - mangohud
      - vkBasalt
      - earlyoom
      - zram-generator
      # --- CLI toolbelt ---
      - bash-completion
      - zsh
      - fish
      - tmux
      - screen
      - eza
      - bat
      - fd-find
      - ripgrep
      - fzf
      - zoxide
      - git-delta
      - du-dust
      - procs
      - btop
      - tealdeer
      - direnv
      - p7zip
      - p7zip-plugins
      - unrar
      - unzip
      - zip
      - zstd
      - xz
      - bzip2
      - rsync
      - mtr
      - iperf3
      - nmap-ncat
      - bind-utils
      - whois
      - tcpdump
      - socat
      - jq
      - yq
      - libxml2
      - fastfetch
      - inxi
      - flatpak-spawn
      - strace
      - ltrace
      - perf
      - numactl
      - hwinfo
      - lshw
      - pciutils
      - usbutils
      - dmidecode
      - neovim
      - helix
      - git
      - tig
      # --- Dev tooling ---
      - podman
      - podman-compose
      - podman-docker
      - buildah
      - skopeo
      - distrobox
      - toolbox
      - flatpak-builder
      - qemu-kvm
      - libvirt
      - virt-install
      - virt-manager
      - gh
      - glab
      - python3
      - python3-pip
      - python3-devel
      - nodejs
      - npm
      - yarnpkg
      - rustc
      - cargo
      - go
      - make
      - cmake
      - ninja-build
      - gcc
      - gcc-c++
      - clang
      - kernel-devel
      - kernel-headers
      # --- Gaming ---
      - gamescope
      - goverlay
      # --- KDE Plasma 6 ---
      - plasma-desktop
      - plasma-workspace
      - plasma-workspace-wayland
      - plasma-nm
      - plasma-pa
      - plasma-firewall
      - plasma-systemmonitor
      - plasma-browser-integration
      - kscreen
      - sddm
      - sddm-kcm
      - sddm-breeze
      - plasma-login-manager
      - kwin
      - kinfocenter
      - kio-fuse
      - kio-extras
      - kde-gtk-config
      - kdegraphics-thumbnailers
      - kf6-kimageformats
      - qt6-qtimageformats
      - qt6-qtwayland
      - kvantum
      - kvantum-qt6
      - layer-shell-qt
      - kcron
      - kfind
      - kmenuedit
      - kwrite
      - kate
      - dolphin
      - dolphin-plugins
      - konsole
      - okular
      - gwenview
      - spectacle
      - kcalc
      - krdc
      - kcharselect
      - kgpg
      - ark
      - filelight
      - ksystemlog
      - kdebugsettings
      - plasma-milou
      - kdialog
      # --- Fonts ---
      - google-noto-sans-fonts
      - google-noto-serif-fonts
      - google-noto-mono-fonts
      - google-noto-emoji-fonts
      - fira-code-fonts
      - jetbrains-mono-fonts
      - cascadia-code-fonts
      - source-foundry-hack-fonts
      - rsms-inter-fonts
      # --- Browser ---
      - firefox
      # --- Security ---
      - firewalld
      - firewall-config
      - firejail
      - usbguard
      - usbguard-selinux
      - clamav
      - clamav-update
      - clamav-unofficial-sigs
      - rkhunter
      - aide
      - polkit
      # --- Anaconda WebUI Live installer ---
      - anaconda-webui
      - anaconda-install-env-deps
      - anaconda-dracut
      - initial-setup
      - initial-setup-gui
      - lorax
      - osbuild-composer
      - pykickstart
      - livecd-tools

  # ===========================================================================
  #  2. Homebrew
  # ===========================================================================
  - type: brew

  # ===========================================================================
  #  3. Pre-baked Flatpaks
  # ===========================================================================
  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - com.valvesoftware.Steam
          - com.valvesoftware.Steam.Utility.MangoHud
          - net.lutris.Lutris
          - org.libretro.RetroArch
          - com.usebottles.bottles
          - com.visualstudio.code
          - org.libreoffice.LibreOffice
          - org.kde.kdenlive
          - io.github.kolunmi.Bazaar
          - io.github.getnf.embellish
          - org.gimp.GIMP
          - org.inkscape.Inkscape
          - net.nokyan.Resources
          - com.ranfdev.DistroShelf

  # ===========================================================================
  #  4. Static files (source: "." = contents of files/ directory)
  # ===========================================================================
  - type: files
    files:
      - source: "."
        destination: /

  # ===========================================================================
  #  5. Master build script (1 Docker layer for COPR + services + 15 scripts)
  # ===========================================================================
  - type: script
    scripts:
      - anubis-build-all.sh

  # ===========================================================================
  #  6. Signing
  # ===========================================================================
  - type: signing
