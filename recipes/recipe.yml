# recipes/recipe.yml
# anubis-os — GNOME desktop, gaming + pentesting leve + everyday security

name: anubis-os
description: GNOME-based gaming, security & pentesting immutable Fedora (Universal Blue)
base-image: ghcr.io/ublue-os/silverblue-main
image-version: "44"

modules:

  # ---------------------------------------------------------------------
  # 1. Remover repo negativo17 quebrado no Fedora 44
  # ---------------------------------------------------------------------
  - type: script
    snippets:
      - grep -rl 'negativo17.org' /etc/yum.repos.d/ | xargs rm -f

  - type: rpm-ostree
    install:
      - ffmpeg

  # ---------------------------------------------------------------------
  # 2. Hardware geral
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - fwupd
      - NetworkManager
      - bluez

  # ---------------------------------------------------------------------
  # 3. Gaming (sem wine — gerenciado via Flatpak/Proton)
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - gamescope
      - gamemode
      - mangohud
      - corectrl

  # ---------------------------------------------------------------------
  # 4. Ferramentas de pentesting leves
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - nmap
      - nmap-ncat
      - whois
      - curl
      - wget
      - bind-utils
      - net-tools

  # ---------------------------------------------------------------------
  # 5. Everyday user security
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - firewalld
      - clamav
      - rkhunter
      - aide
      - firejail

  # ---------------------------------------------------------------------
  # 6. Terminal / shell enhancements
  # ---------------------------------------------------------------------
  - type: rpm-ostree
    install:
      - fastfetch
      - bash-color-prompt
      - starship

  # ---------------------------------------------------------------------
  # 7. Flatpaks
  # ---------------------------------------------------------------------
  - type: default-flatpaks@v1
    notify: true
    system:
      install:
        # Gaming
        - net.davidotek.pupgui2
        - com.valvesoftware.Steam
        - com.heroicgameslauncher.hgl
        - net.lutris.Lutris
        # Emuladores
        - org.ppsspp.PPSSPP
        - net.pcsx2.PCSX2
        - org.DolphinEmu.dolphin-emu
        - org.ryujinx.Ryujinx
        - net.rpcs3.RPCS3
        # Criativo
        - org.gimp.GIMP
        - org.inkscape.Inkscape
        - com.github.PintaProject.Pinta
        # Office
        - org.onlyoffice.desktopeditors
        # Browser
        - com.brave.Browser
        # Utilitários
        - com.mattjakeman.ExtensionManager
        - com.github.Aylur.ags
        - org.gnome.Resources
        - org.gnome.Boxes
        - io.github.flattool.Warehouse
        # Loja
        - org.gnome.Baobab
        - io.gitlab.adhami3310.Impression
        # Terminal
        - app.devsuite.Ptyxis
        # Bazaar (loja)
        - page.codeberg.Cogitri.Bazaar

  # ---------------------------------------------------------------------
  # 8. GNOME extensions
  # ---------------------------------------------------------------------
  - type: gnome-extensions
    install:
      - Dash to Dock
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Logo Menu
      - Caffeine
      - PaperWM

  # ---------------------------------------------------------------------
  # 9. Homebrew
  # ---------------------------------------------------------------------
  - type: brew

  # ---------------------------------------------------------------------
  # 10. Arquivos do sistema
  # ---------------------------------------------------------------------
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - set-permissions.sh
      - enable-first-boot-units.sh
      - setup-hostname.sh
      - setup-os-release.sh
      - setup-logo.sh
      - setup-plymouth.sh
      - setup-wallpaper.sh
      - setup-ohmybash.sh
      - enable-gnome-extensions-defaults.sh

  # ---------------------------------------------------------------------
  # 11. Signing
  # ---------------------------------------------------------------------
  - type: signing
